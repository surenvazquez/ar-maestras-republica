<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Matilde Ledesma Martín · AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #back {
      position: fixed; top: 12px; left: 12px; z-index: 999;
      background: rgba(91,61,138,0.8); color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 14px; font-size: 13px;
      font-family: Georgia, serif; text-decoration: none;
    }
  </style>
</head>
<body>
  <a href="index.html" id="back">← Volver</a>

  <a-scene embedded arjs="detectionMode: mono; matrixCodeType: 3x3;" vr-mode-ui="enabled: false">
    <a-assets>
      <img id="matilde" src="matilde_marcador.png">
    </a-assets>

    <a-marker type="pattern" url="matilde.patt">

      <a-text
        value="Matilde Ledesma Martín\nMaestra de la República"
        position="0 1.5 0"
        align="center"
        color="#e8c8ff"
        scale="0.7 0.7 0.7"
        line-height="1.4">
      </a-text>

      <a-plane
        position="0 0.5 0"
        rotation="-90 0 0"
        width="2" height="0.8"
        color="#3d1f6e"
        opacity="0.85">
      </a-plane>

      <a-text
        value="Dedicó su vida a la educación\npública en la España republicana"
        position="0 0.5 0"
        align="center"
        color="#ffffff"
        scale="0.45 0.45 0.45"
        rotation="-90 0 0"
        line-height="1.5">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
